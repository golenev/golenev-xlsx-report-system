version: '3.9'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: test_report
      POSTGRES_USER: report
      POSTGRES_PASSWORD: report
    ports:
      - "55489:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      # Gradle resolves Maven artifacts while building the image; using the
      # host network avoids BuildKit bridge DNS/routing failures in restricted environments.
      network: host
    environment:
      DB_URL: jdbc:postgresql://db:5432/test_report
      DB_USERNAME: report
      DB_PASSWORD: report
      COLUMN_CONFIG_PATH: /app/config/column-config.json
      PORT: 18080
    volumes:
      - ./config:/app/config:ro
    depends_on:
      - db
    ports:
      - "18080:18080"

volumes:
  db-data:
